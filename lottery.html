<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機車抽籤系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',sans-serif;background:#0f1117;color:#e8e8e8;min-height:100vh}
.top{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.top h1{font-size:18px;font-weight:600;color:#fff}
.top p{font-size:13px;color:#6b7280;margin-top:2px}
.main{max-width:900px;margin:0 auto;padding:28px 20px}
.tabs{display:flex;gap:4px;background:#1a1d27;border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:#9ca3af;border-radius:8px;font-family:inherit}
.tab.on{background:#4f46e5;color:#fff}
.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:24px;margin-bottom:16px}
.ct{font-size:12px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ct::before{content:'';width:3px;height:14px;background:#4f46e5;border-radius:2px;display:inline-block}
.zone{border:2px dashed #374151;border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;background:#12141e}
.zone:hover{border-color:#4f46e5;background:#1e1f35}
.zone .ic{font-size:44px;margin-bottom:10px}
.zone p{font-size:15px;font-weight:500;color:#e8e8e8;margin-bottom:4px}
.zone small{font-size:13px;color:#6b7280}
input[type=file]{display:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.bp{background:#4f46e5;color:#fff}.bp:hover{background:#4338ca}.bp:disabled{background:#374151;color:#6b7280;cursor:not-allowed}
.bs{background:#059669;color:#fff}.bs:hover{background:#047857}
.bo{background:transparent;color:#9ca3af;border:1px solid #374151}.bo:hover{background:#252836;color:#e8e8e8}
.bsm{padding:6px 12px;font-size:13px}
.msg{padding:12px 16px;border-radius:8px;font-size:14px;margin-top:12px}
.ok{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.er{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}
.inf{background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8}
.hide{display:none}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:9px 12px;font-size:12px;font-weight:600;color:#6b7280;border-bottom:1px solid #2a2d3a}
td{padding:11px 12px;border-bottom:1px solid #1f2130;color:#d1d5db}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1f2130}
.ci{width:120px;padding:6px 10px;border:1px solid #374151;border-radius:6px;font-size:14px;background:#12141e;color:#e8e8e8;font-family:inherit}
.ci:focus{outline:none;border-color:#4f46e5}
.ci.ok2{border-color:#059669}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.sc{background:#12141e;border:1px solid #2a2d3a;border-radius:10px;padding:16px}
.sn{font-size:26px;font-weight:700;color:#fff}
.sl{font-size:12px;color:#6b7280;margin-top:2px}
.bdg{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.bg{background:#064e3b;color:#6ee7b7}
.bb{background:#1e3a5f;color:#93c5fd}
.bp2{background:#2e1065;color:#c4b5fd}
.ri{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#12141e;border-radius:8px;margin-bottom:8px;border:1px solid #2a2d3a}
.rk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.r1{background:#d97706;color:#fff}.r2{background:#6b7280;color:#fff}.r3{background:#92400e;color:#fff}
.rn{background:#1f2937;color:#9ca3af;border:1px solid #374151}.ra{background:#1e3a5f;color:#93c5fd}
.pb{height:7px;background:#1f2937;border-radius:4px;overflow:hidden;margin-top:6px}
.pf{height:100%;background:linear-gradient(90deg,#4f46e5,#059669);border-radius:4px;transition:width .4s}
.lb{background:#12141e;border:1px solid #374151;border-radius:8px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0}
.lb code{font-family:monospace;font-size:12px;color:#9ca3af;word-break:break-all}
.sr{display:flex;gap:8px;margin-bottom:14px}
.si{flex:1;padding:9px 12px;border:1px solid #374151;border-radius:8px;font-size:14px;background:#12141e;color:#e8e8e8;font-family:inherit}
.si:focus{outline:none;border-color:#4f46e5}
.set{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.set label{display:block;font-size:13px;color:#9ca3af;margin-bottom:5px}
.set input{width:100%;padding:9px 12px;border:1px solid #374151;border-radius:8px;font-size:15px;font-weight:600;background:#12141e;color:#e8e8e8;font-family:inherit}
.ar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.tok-box{background:#12141e;border:1px solid #374151;border-radius:8px;padding:16px;margin-bottom:16px}
.tok-box p{font-size:13px;color:#9ca3af;margin-bottom:8px}
.tok-row{display:flex;gap:8px}
.tok-input{flex:1;padding:9px 12px;border:1px solid #374151;border-radius:8px;font-size:13px;background:#0f1117;color:#e8e8e8;font-family:monospace}
.tok-input:focus{outline:none;border-color:#4f46e5}
.tok-ok{font-size:12px;color:#6ee7b7;margin-top:6px}
</style>
</head>
<body>
<div class="top">
  <div>
    <h1>🏍️ 機車抽籤系統</h1>
    <p>上傳名單 · 填寫車號 · 公平抽籤</p>
  </div>
  <div style="font-size:13px;color:#6b7280" id="clk"></div>
</div>
<div class="main">

  <!-- Token 輸入區 -->
  <div class="tok-box" id="tokbox">
    <p>🔑 請輸入 Airtable API Token（每次開啟需輸入一次，不會儲存）</p>
    <div class="tok-row">
      <input type="password" class="tok-input" id="tokin" placeholder="pat...">
      <button class="btn bp" onclick="setTok()">確認</button>
    </div>
    <div id="tokst" style="font-size:12px;margin-top:6px;color:#6b7280"></div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="sw('a')">🛡️ 管理員</button>
    <button class="tab" onclick="sw('u')">👤 填寫車號</button>
    <button class="tab" onclick="sw('d')">🎟️ 抽籤</button>
  </div>

  <div id="pa">
    <div class="card">
      <div class="ct">步驟一：上傳名單</div>
      <div class="zone" onclick="document.getElementById('fi').click()">
        <div class="ic">📊</div>
        <p>點擊這裡選擇 Excel 檔案</p>
        <small>支援 .xlsx / .xls / .csv｜需有「單位」「姓名」「工號」欄位｜自動合併所有分頁</small>
      </div>
      <input type="file" id="fi" accept=".xlsx,.xls,.csv" onchange="rf(this)">
      <div id="m1" class="hide"></div>
    </div>
    <div class="card hide" id="pc">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="ct" style="margin:0">步驟二：確認名單</div>
        <span id="pb2" class="bdg bp2"></span>
      </div>
      <div style="overflow-x:auto;margin-bottom:14px">
        <table><thead><tr><th>單位</th><th>姓名</th><th>工號</th><th>車號（原有）</th></tr></thead>
        <tbody id="pbd"></tbody></table>
      </div>
      <div class="ar">
        <button class="btn bp" id="ub" onclick="upl()">☁️ 上傳至 Airtable</button>
        <span style="font-size:13px;color:#6b7280" id="us"></span>
      </div>
      <div id="m2" class="hide"></div>
    </div>
    <div class="card hide" id="lc">
      <div class="ct">步驟三：傳送填寫連結</div>
      <p style="font-size:14px;color:#9ca3af;margin-bottom:8px">將此連結傳給所有員工填寫車號：</p>
      <div class="lb"><code id="lt">—</code><button class="btn bo bsm" onclick="cpl()">複製</button></div>
      <div style="display:flex;justify-content:space-between;margin-top:14px;margin-bottom:4px">
        <span style="font-size:13px;color:#9ca3af">填寫進度</span>
        <span style="font-size:13px;font-weight:600" id="pt">0/0</span>
      </div>
      <div class="pb"><div class="pf" id="pff" style="width:0%"></div></div>
      <div style="margin-top:12px"><button class="btn bo bsm" onclick="rp()">🔄 重新整理進度</button></div>
    </div>
  </div>

  <div id="pu" class="hide">
    <div class="card">
      <div class="ct">搜尋並填寫車號</div>
      <div class="sr">
        <input type="text" class="si" id="sq" placeholder="輸入姓名、工號或單位搜尋..." oninput="ds()">
        <button class="btn bo" onclick="la()">🔄 載入名單</button>
      </div>
      <div id="um" class="hide"></div>
      <div id="ut" class="hide" style="overflow-x:auto">
        <table><thead><tr><th>姓名</th><th>工號</th><th>單位</th><th>車號</th><th></th></tr></thead>
        <tbody id="ub2"></tbody></table>
      </div>
    </div>
  </div>

  <div id="pd" class="hide">
    <div class="sg">
      <div class="sc"><div class="sn" id="st">—</div><div class="sl">總人數</div></div>
      <div class="sc"><div class="sn" id="sf" style="color:#6ee7b7">—</div><div class="sl">已填車號</div></div>
      <div class="sc"><div class="sn" id="sp" style="color:#fca5a5">—</div><div class="sl">未填寫</div></div>
    </div>
    <div class="card">
      <div class="ct">抽籤設定</div>
      <div class="set">
        <div><label>正式名額</label><input type="number" id="ms" value="155"></div>
        <div><label>候補名額</label><input type="number" id="as" value="20"></div>
      </div>
      <div id="dm" class="msg inf" style="margin-bottom:14px">請先載入資料再抽籤。</div>
      <div class="ar">
        <button class="btn bo" onclick="ld()">🔄 載入資料</button>
        <button class="btn bs" id="db" onclick="draw()" disabled>▶ 開始抽籤</button>
      </div>
    </div>
    <div class="card hide" id="rc">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="ct" style="margin:0">抽籤結果</div>
        <div style="display:flex;gap:8px">
          <span class="bdg bg">正式 <span id="mc">0</span> 名</span>
          <span class="bdg bb">候補 <span id="ac">0</span> 名</span>
        </div>
      </div>
      <div id="rl"></div>
      <div style="margin-top:14px"><button class="btn bo" onclick="exp()">⬇️ 匯出結果 CSV</button></div>
    </div>
  </div>
</div>

<script>
var T='';
var B='appYpKkyDe9kZ9UTY';
var TL='tblD31nIFDc7i1XaU';
var loc=[],recs=[];

function getU(){return 'https://api.airtable.com/v0/'+B+'/'+TL;}
function getH(){return {'Authorization':'Bearer '+T,'Content-Type':'application/json'};}

setInterval(function(){
  var d=new Date();
  document.getElementById('clk').textContent=d.toLocaleString('zh-TW');
},1000);

function setTok(){
  var v=document.getElementById('tokin').value.trim();
  if(!v){alert('請輸入 Token');return;}
  T=v;
  document.getElementById('tokst').textContent='✓ Token 已設定（'+v.substring(0,10)+'...）';
  document.getElementById('tokst').style.color='#6ee7b7';
  document.getElementById('tokin').value='';
}

function sw(t){
  ['a','u','d'].forEach(function(id,i){
    document.getElementById('p'+id).classList.toggle('hide',id!==t);
    document.querySelectorAll('.tab')[i].classList.toggle('on',id===t);
  });
  if(t==='u')la();
  if(t==='d')ld();
}

function rf(inp){
  var f=inp.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'binary'});
      var all=[];
      wb.SheetNames.forEach(function(sn){
        var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
        all=all.concat(rows);
      });
      if(!all.length){sm('m1','er','檔案沒有資料');return;}
      loc=all.map(function(r){return{
        單位:String(r['單位']||r['部門']||'').trim(),
        姓名:String(r['姓名']||r['name']||'').trim(),
        工號:String(r['工號']||r['ID']||'').trim(),
        車號:String(r['車號']||r['機車車號']||'').trim()
      };}).filter(function(r){return r.姓名;});
      if(!loc.length){sm('m1','er','找不到姓名欄位，請確認格式');return;}
      var tb=document.getElementById('pbd');
      tb.innerHTML=loc.slice(0,8).map(function(r){
        return '<tr><td>'+r.單位+'</td><td>'+r.姓名+'</td><td>'+r.工號+'</td><td style="color:#6b7280">'+(r.車號||'（待填）')+'</td></tr>';
      }).join('')+(loc.length>8?'<tr><td colspan="4" style="color:#6b7280;font-size:13px;padding:10px 12px">... 還有'+(loc.length-8)+'人</td></tr>':'');
      document.getElementById('pb2').textContent='共'+loc.length+'人';
      document.getElementById('pc').classList.remove('hide');
      sm('m1','ok','✓ 成功讀取'+loc.length+'筆資料（'+wb.SheetNames.length+'個分頁合併）');
    }catch(e){sm('m1','er','讀取失敗，請確認檔案格式');}
  };
  r.readAsBinaryString(f);
}

async function upl(){
  if(!T){alert('請先輸入 Airtable Token！');return;}
  var btn=document.getElementById('ub');
  btn.disabled=true; btn.textContent='上傳中...';
  var st=document.getElementById('us');
  try{
    var ex=await fa();
    if(ex.length){
      var ch=ck(ex.map(function(r){return r.id;}),10);
      for(var i=0;i<ch.length;i++){
        await fetch(getU()+'?'+ch[i].map(function(id){return'records[]='+id;}).join('&'),{method:'DELETE',headers:getH()});
      }
    }
    var ch2=ck(loc,10); var done=0;
    for(var i=0;i<ch2.length;i++){
      var res=await fetch(getU(),{method:'POST',headers:getH(),body:JSON.stringify({records:ch2[i].map(function(r){return{fields:{單位:r.單位,姓名:r.姓名,工號:r.工號,車號:r.車號}};})})});
      if(!res.ok){var d=await res.json();throw new Error(d.error?d.error.message:'API錯誤 '+res.status);}
      done+=ch2[i].length; st.textContent='已上傳'+done+'/'+loc.length+'筆';
    }
    document.getElementById('lc').classList.remove('hide');
    document.getElementById('lt').textContent=window.location.href;
    await rp();
    btn.textContent='✓ 上傳完成'; btn.className='btn bs';
    sm('m2','ok','✓ 名單上傳成功！可以將連結傳給員工填寫車號。');
  }catch(e){
    sm('m2','er','上傳失敗：'+e.message);
    btn.disabled=false; btn.textContent='☁️ 上傳至 Airtable';
  }
}

async function fa(){
  var recs2=[],off='';
  do{
    var res=await fetch(getU()+'?pageSize=100'+(off?'&offset='+off:''),{headers:{Authorization:'Bearer '+T}});
    var d=await res.json();
    if(d.error)throw new Error(d.error.message);
    recs2=recs2.concat(d.records||[]); off=d.offset||'';
  }while(off);
  return recs2;
}

async function rp(){
  var r=await fa();
  var t=r.length,f=r.filter(function(x){return x.fields['車號'];}).length;
  document.getElementById('pt').textContent=f+'/'+t;
  document.getElementById('pff').style.width=t?Math.round(f/t*100)+'%':'0%';
}

async function la(){
  if(!T){sm2('um','inf','請先在上方輸入 Token 後載入');return;}
  sm2('um','inf','載入中...');
  try{
    recs=await fa();
    document.getElementById('um').classList.add('hide');
    ru(recs);
  }catch(e){sm2('um','er','載入失敗：'+e.message);}
}

function ds(){
  var q=document.getElementById('sq').value.trim().toLowerCase();
  ru(q?recs.filter(function(r){
    return(r.fields['姓名']||'').toLowerCase().includes(q)||
           (r.fields['工號']||'').toLowerCase().includes(q)||
           (r.fields['單位']||'').toLowerCase().includes(q);
  }):recs);
}

function ru(list){
  var tb=document.getElementById('ub2'),wrap=document.getElementById('ut');
  if(!list.length){
    tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:#6b7280;padding:18px">找不到符合的人員</td></tr>';
    wrap.classList.remove('hide'); return;
  }
  tb.innerHTML=list.map(function(r){
    var v=r.fields['車號']||'';
    return '<tr><td style="font-weight:500">'+r.fields['姓名']+
      '</td><td style="color:#9ca3af">'+r.fields['工號']+
      '</td><td style="color:#9ca3af">'+r.fields['單位']+
      '</td><td><input class="ci'+(v?' ok2':'')+'" value="'+v+'" placeholder="填入車號" id="c_'+r.id+'" maxlength="10"></td>'+
      '<td><button class="btn bo bsm" onclick="sv(\''+r.id+'\')">✓ 儲存</button></td></tr>';
  }).join('');
  wrap.classList.remove('hide');
}

async function sv(id){
  if(!T){alert('請先輸入 Token');return;}
  var inp=document.getElementById('c_'+id);
  var v=inp.value.trim().toUpperCase();
  if(!v){alert('請填入車號');return;}
  try{
    var res=await fetch(getU()+'/'+id,{method:'PATCH',headers:getH(),body:JSON.stringify({fields:{車號:v}})});
    if(!res.ok)throw new Error('API錯誤');
    inp.classList.add('ok2');
    var rec=recs.find(function(x){return x.id===id;}); if(rec)rec.fields['車號']=v;
  }catch(e){alert('儲存失敗，請重試');}
}

async function ld(){
  if(!T){var dm=document.getElementById('dm');dm.className='msg er';dm.textContent='請先輸入 Token';return;}
  var dm=document.getElementById('dm'); dm.className='msg inf'; dm.textContent='載入中...';
  try{
    recs=await fa();
    var t=recs.length,f=recs.filter(function(r){return r.fields['車號'];}).length;
    document.getElementById('st').textContent=t;
    document.getElementById('sf').textContent=f;
    document.getElementById('sp').textContent=t-f;
    if(f===0){dm.textContent='目前沒有人填寫車號。'; document.getElementById('db').disabled=true;}
    else{dm.className='msg ok'; dm.textContent='✓ 已有'+f+'人填寫車號，可以抽籤！'; document.getElementById('db').disabled=false;}
  }catch(e){dm.className='msg er'; dm.textContent='載入失敗：'+e.message;}
}

function draw(){
  var pool=recs.filter(function(r){return r.fields['車號'];}); if(!pool.length)return;
  for(var rd=0;rd<3;rd++){
    for(var i=pool.length-1;i>0;i--){
      var a=new Uint32Array(1); crypto.getRandomValues(a);
      var j=a[0]%(i+1); var tmp=pool[i]; pool[i]=pool[j]; pool[j]=tmp;
    }
  }
  var m=parseInt(document.getElementById('ms').value)||155;
  var a=parseInt(document.getElementById('as').value)||20;
  var ml=pool.slice(0,m),al=pool.slice(m,m+a);
  document.getElementById('mc').textContent=ml.length;
  document.getElementById('ac').textContent=al.length;
  var rl=document.getElementById('rl'); rl.innerHTML='';
  ml.forEach(function(r,i){
    var d=document.createElement('div'); d.className='ri';
    var rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    d.innerHTML='<div class="rk '+rc+'">'+(i+1)+'</div>'+
      '<div style="flex:1"><span style="font-weight:600">'+r.fields['姓名']+'</span>'+
      '<span style="color:#9ca3af;font-size:12px;margin-left:8px">'+r.fields['工號']+'</span>'+
      '<span style="color:#6b7280;font-size:12px;margin-left:6px">'+r.fields['單位']+'</span></div>'+
      '<span style="font-family:monospace;font-size:13px;color:#9ca3af;margin-right:8px">'+r.fields['車號']+'</span>'+
      '<span class="bdg bg" style="font-size:11px">正式</span>';
    rl.appendChild(d);
  });
  al.forEach(function(r,i){
    var d=document.createElement('div'); d.className='ri';
    d.innerHTML='<div class="rk ra">補'+(i+1)+'</div>'+
      '<div style="flex:1"><span style="font-weight:600">'+r.fields['姓名']+'</span>'+
      '<span style="color:#9ca3af;font-size:12px;margin-left:8px">'+r.fields['工號']+'</span>'+
      '<span style="color:#6b7280;font-size:12px;margin-left:6px">'+r.fields['單位']+'</span></div>'+
      '<span style="font-family:monospace;font-size:13px;color:#9ca3af;margin-right:8px">'+r.fields['車號']+'</span>'+
      '<span class="bdg bb" style="font-size:11px">候補</span>';
    rl.appendChild(d);
  });
  document.getElementById('rc').classList.remove('hide');
}

function exp(){
  var items=document.querySelectorAll('.ri'); var csv='順序,姓名,工號,單位,車號,類別\n';
  items.forEach(function(item){
    var rk=item.querySelector('.rk').textContent;
    var sp=item.querySelectorAll('span');
    csv+=rk+','+sp[0].textContent.trim()+','+sp[1].textContent.trim()+','+sp[2].textContent.trim()+','+sp[3].textContent.trim()+','+sp[4].textContent.trim()+'\n';
  });
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='抽籤結果.csv'; a.click();
}

function cpl(){navigator.clipboard.writeText(window.location.href).then(function(){alert('連結已複製！');});}
function sm(id,t,s){var e=document.getElementById(id);e.className='msg '+t;e.textContent=s;e.classList.remove('hide');}
function sm2(id,t,s){var e=document.getElementById(id);e.className='msg '+t;e.textContent=s;e.classList.remove('hide');}
function ck(arr,n){var r=[];for(var i=0;i<arr.length;i+=n)r.push(arr.slice(i,i+n));return r;}
</script>
